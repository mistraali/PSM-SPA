<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rejestracja użytkownika</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
</head>
<body class="bg-light">

<div id="app" class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-10 col-md-7 col-lg-5">
      <div class="card shadow">
        <div class="card-body">
          <h4 class="card-title text-center mb-4">Rejestracja użytkownika</h4>

          <form @submit.prevent="registerUser">
            <div class="mb-3">
              <label class="form-label">Imię i nazwisko</label>
              <input
                type="text"
                class="form-control"
                v-model.trim="form.fullName"
                placeholder="Wpisz imię i nazwisko"
              >
            </div>

            <div class="mb-3">
              <label class="form-label">E-mail</label>
              <input
                type="email"
                class="form-control"
                v-model.trim="form.email"
                placeholder="Wpisz adres e-mail"
              >
            </div>

            <div class="mb-3">
              <label class="form-label">Hasło</label>
              <input
                type="password"
                class="form-control"
                v-model="form.password"
                placeholder="Wpisz hasło"
              >
            </div>

            <div class="mb-3">
              <label class="form-label">Powtórz hasło</label>
              <input
                type="password"
                class="form-control"
                v-model="form.confirmPassword"
                placeholder="Powtórz hasło"
              >
            </div>

            <div class="form-check mb-4">
              <input
                id="terms"
                type="checkbox"
                class="form-check-input"
                v-model="form.acceptedTerms"
              >
              <label class="form-check-label" for="terms">
                Akceptuję regulamin
              </label>
            </div>

            <button
              type="submit"
              class="btn btn-primary w-100"
              :disabled="!isFormValid"
            >
              Zarejestruj
            </button>
          </form>

          <div v-if="registered" class="alert alert-success mt-4 mb-0 text-center">
            Użytkownik został zarejestrowany.
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const { createApp } = Vue;

createApp({
  data() {
    return {
      form: {
        fullName: '',
        email: '',
        password: '',
        confirmPassword: '',
        acceptedTerms: false
      },
      registered: false
    };
  },
  computed: {
    isFormValid() {
      return this.form.fullName !== ''
        && this.form.email !== ''
        && this.form.email.includes('@')
        && this.form.password !== ''
        && this.form.confirmPassword !== ''
        && this.form.password === this.form.confirmPassword
        && this.form.acceptedTerms;
    }
  },
  methods: {
    registerUser() {
      if (!this.isFormValid) return;

      this.registered = true;
    }
  }
}).mount('#app');
</script>

</body>
</html>
