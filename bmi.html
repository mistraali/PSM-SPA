<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>BMI</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
</head>

<body class="bg-light">

<div id="app" class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-10 col-md-6 col-lg-4">
      <div class="card shadow">
        <div class="card-body">
          <h4 class="card-title text-center mb-4">Kalkulator BMI</h4>

          <div class="mb-3">
            <label class="form-label">Wzrost (cm)</label>
            <input
              type="number"
              class="form-control"
              v-model.number="height"
              @focus="resetResult"
              placeholder="np. 180"
            >
          </div>

          <div class="mb-3">
            <label class="form-label">Waga (kg)</label>
            <input
              type="number"
              class="form-control"
              v-model.number="weight"
              @focus="resetResult"
              placeholder="np. 75"
            >
          </div>

          <button
            class="btn btn-primary w-100 mb-3"
            @click="calculate"
          >
            Oblicz BMI
          </button>

          <div v-if="showResult && bmi !== null" class="alert alert-info text-center">
            Twoje BMI: <strong>{{ bmi }}</strong>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>

<script>
const { createApp } = Vue;

createApp({
  data() {
    return {
      height: null,
      weight: null,
      showResult: false
    };
  },
  computed: {
    bmi() {
      if (!this.height || !this.weight) return null;

      const h = this.height / 100;
      return (this.weight / (h * h)).toFixed(2);
    }
  },
  methods: {
    calculate() {
      this.showResult = true;
    },
    resetResult() {
      this.showResult = false;
    }
  }
}).mount('#app');
</script>

</body>
</html>
